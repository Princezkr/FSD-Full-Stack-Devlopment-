<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Marquee</h1>
    <dl>
        <dt><b>Default Marquee</b></dt>
        <dd><marquee behaviour="" direction="" scrollamount="" loop="">Hello</marquee></dd>
        <dt><b>Scroll Behavior Marquee</b></dt>
        <dd><marquee behavior="scroll" direction="" scrollamount="" loop="">Hello</marquee></dd>
        <dt><b>Slide Behavior Marquee</b></dt>
        <dd><marquee behavior="slide" direction="" scrollamount="" loop="">Hello</marquee></dd>
        <dt><b>Alternate Behavior Marquee</b></dt>
        <dd><marquee behavior="alternate" direction="" scrollamount="" loop="">Hello</marquee></dd>
        <dt><b>Right Direction Marquee</b></dt>
        <dd><marquee behavior="scroll" direction="right" scrollamount="" loop="">Hello</marquee></dd>
        <dt><b>20 Scroll Amount Marquee</b></dt>
        <dd><marquee behaviour="" direction="" scrollamount="20" loop="">Hello</marquee></dd>
        <dt><b>3 loop in Scroll Behavior Marquee</b></dt>
        <dd><marquee behaviour="" direction="" scrollamount="20" loop="3">Hello</marquee></dd>
        <dt><b>4 loop in Alternate Behavior Marquee</b></dt>
        <dd><marquee behavior="alternate" direction="" scrollamount="20" loop="4">Hello</marquee></dd>
    </dl>
</body>
</html>
