<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form style="background-color: lightgreen; text-align: center;">
        <br>
        <p style="color: red;"><b>Personal Details</b></p>
        <lable for="Name">Name:</lable>
        <input type="text" id="Name" name="Name">
        <br><br>
        <lable for="Password">Password:</lable>
        <input type="password" id="Password" name="Password">
        <br><br>
        <lable for="Email">E-mail id:</lable>
        <input type="text" id="Email" name="Email">
        <br><br>
        <lable>Gender:</lable>
        <input type="radio" id="Male" value="Male" name="Gender">
        <lable for="Male">Male</lable>
        <input type="radio" id="Female" value="Female" name="Gender">
        <lable for="Female">Female</lable>
        <br><br>
        <lable for="Contact">Contact#:</lable>
        <input type="text" id="Contact" name="Contact">
        <br>
        <p style="color: red;"><b>Educational Qualification</b></p>
        <lable for="Degree">Degree</lable>
        <select id="Degree" name="Degree">
            <option selected disabled>--Select Group--</option>
        </select>
        <br><br>
        <lable for="Engineering">Engineering:</lable>
        <select id="Engineering" name="Engineering">
            <option disabled selected>--Select Group--</option>
        </select>
        <br><br>
        <lable>Hobbies:</lable>
        <input type="checkbox" id="Chess" value="Playing Chess" name="Hobbies">
        <lable for="Chess">Playing Chess</lable>
        <input type="checkbox" id="Books" value="Reading Books" name="Hobbies">
        <lable for="Books">Reading Books</lable>
        <br><br>
        <p style="color: red;"><b>Address</b></p>
        <textarea></textarea>
        <br><br>
        <lable for="Attachments">Attch Resume:</lable>
        <input type="file" id="Attachment" name="Attachments">
        <br><br>
        <button style="background-color: orange; color: white;">Submit ➡️</button>
        <br><br>
    </form>
</body>
</html>
