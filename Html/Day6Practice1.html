<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color:azure;">
    <h1 style="text-align:center;">My Website</h1>
    <table border="10" style="background-color: chartreuse;">
        <caption><b>Registration Form</b></caption>
        <form action="https://youtu.be/iik25wqIuFo?si=RGL6wvrsFDsfibh5">
            <tr>
                <td>Enter Your Name:</td>
                <td><input type="text" placeholder="Your Name"></td>
            </tr>
            <tr>
                <td>Enter Your Father's Name:</td>
                <td><input type="text" placeholder="Father's Name"></td>
            </tr>
            <tr>
                <td>Enter Your Mother's Name:</td>
                <td><input type="text" placeholder="Mother's Name"></td>
            </tr>
            <tr>
                <td>Enter Your Phone No.:</td>
                <td><input type="number" placeholder="Phone No."></td>
            </tr>
            <tr>
                <td>Enter Your Date Of Birth:</td>
                <td><input type="date"></td>
            </tr>
            <tr>
                <td>Enter Time Of Birth:</td>
                <td><input type="time"></td>
            </tr>
            <tr>
                <td>Enter Your Email:</td>
                <td><input type="text"></td>
            </tr>
            <tr>
                <td>Enter Your Favorite Color:</td>
                <td><input type="color"></td>
            </tr>
            <tr>
                <td colspan="2"><button style="text-align: center;">Submit</button></td>
            </tr>
        </form>
    </table>
</body>
</html>
