<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../Css/Day16Assignment2.css">
</head>
<body>
    <div class="ForFlex">
        <div id="A2">
            <div id="Upper">
                <h1>Display Property Example</h1>
                <h2>Block Elements</h2>
                <p>I am Block</p>
                <p>Full Width</p>
            </div>
            <div id="Middle">
                <h2>Inline Elements</h2>
                <span id="First"><p>Item 1</p></span>
                <span><p>Item 2</p></span>
                <span><p>Item 3</p></span>
            </div>
            <div id="Lower">
                <h2>⇨ Change Colors on Hover!</h2>
                <p>Block Elements: Takes full width</p>
                <p>Inline Elements: Stay in same line</p>
                <p>Inline-Block Elements: Same line + box shaped</p>
                <span class=Box><p>Box 1</p></span>
                <span class=Box><p>Box 2</p></span>
                <span class=Box><p>Box 2</p></span>
                <span class=Box><p>Box 3</p></span>
            </div>
        </div>
    </div>
</body>
</html>
