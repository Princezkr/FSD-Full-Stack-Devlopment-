<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form style="background-color: orange;">
        <div style="margin-left: 50px;">
            <h1>Student Registration Form</h1>
            <p>Fill in this form to register</p>
            <br>
            <lable for="FirstName"><b>First Name</b></lable>
            <input style="margin-left: 17px;" type="text" placeholder="Enter your first name" id="FirstName" name="FirstName">
            <br><br>
            <lable for="LastName"><b>Last Name</b></lable>
            <input style="margin-left: 20px;" type="text" placeholder="Enter your last name" id="LastName" name="LastName">
            <br><br>
            <lable for="Email"><b>E-mail</b></lable>
            <input style="margin-left: 48px;" type="text" placeholder="Enter your e-mail" id="FirstName" name="Email">
            <br><br>
            <lable for="DOB"><b>Date of Birth</b></lable>
            <input style="margin-left: 4px;" type="date" id="DOB" name="DOB">
            <br><br>
            <lable for="Username"><b>Set Username</b></lable>
            <input type="text" placeholder="Set Username" id="Username" name="Username">
            <br><br>
            <lable for="Password"><b>Set Password</b></lable>
            <input style="margin-left: 4px;" type="password" placeholder="Set Password" id="Password" name="Password">
            <br><br>
            <lable><b>Gender</b><br></lable>
            <input type="radio" id="Male" value="Male" name="Gender">
            <lable for="Male">Male</lable>
            <br>
            <input type="radio" id="Male" value="Male" name="Gender">
            <lable for="Female">Female</lable>
            <br>
            <input type="radio" id="Male" value="Male" name="Gender">
            <lable for="Others">Others</lable>
            <br><br>
            <lable for="Course"><b>Course:</b></lable>
            <select id="Course" name="Course">
                <option selected disabled>Course</option>
                <option value="B.tech">B.tech</option>
                <option value="M.tech">M.tech</option>
                <option value="B.com">B.com</option>
                <option value="MBA">MBA</option>
                <option value="MCA">MCA</option>
            </select>
            <br><br>
            <button>Register</button>
            <br><br>
        </div>
    </form>
</body>
</html>
