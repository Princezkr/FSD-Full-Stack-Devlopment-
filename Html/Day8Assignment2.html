<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form style="background-color:#045D5D; color: white;">
        <h1 style="text-align: center;">Application Form</h1>
        <div style="margin-left: 430px;">
            <lable for="FirstName">First Name:</lable>
            <input type="text" id="FirstName" name="FirstName" style="margin-left: 10px;">
            <lable for="LastName" style="margin-left: 98px;">Last Name:</lable>
            <input type="Text" id="LastName" style="margin-left: 48px;">
            <br><br>
            <lable for="DOB">Date of birth:</lable>
            <input type="date" id="DOB" name="DOB">
            <lable for="Age" style="margin-left: 150px;">Age:</lable>
            <input type="number" id="Age" name="Age" style="margin-left: 93px;">
            <br><br>
            <lable for="Gender" >Gender:</lable>
            <select id="Gender" name="Gender" style="margin-left: 35px;">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Others">Others</option>
            </select>
            <lable for="Email" style="margin-left: 200px;">Email Address:</lable>
            <input type="text" placeholder="Enter email address"style="margin-left: 26px;">
            <br><br>
            <lable >Positions Available:</lable>
            <input type="radio" id="Junior" value="Junior Developer" name="Position">
            <lable for="Junior">Junior Developer</lable>
            <input type="radio" id="MidLevel" value="Mid-level Developer" name="Position">
            <lable for="MidLevel">Mid-level Developer</lable>
            <input type="radio" id="Senior" value="Senior Developer" name="Position">
            <lable for="Junior">Senior Developer</lable>
            <br><br>
            <lable >Programming Languages:</lable>
            <input type="checkbox" id="Java" value="Java" name="Languages">
            <lable for="Java">Java</lable>
            <input type="checkbox" id="JavaScript" value="JavaScript" name="Languages">
            <lable for="JavaScript">JavaScript</lable>
            <input type="checkbox" id="Python" value="Python" name="Languages">
            <lable for="Python">Python</lable>
            <br><br>
            <lable for="Password">Password:</lable>
            <input type="password" id="Password" name="Password" style="margin-left: 20px;">
            <lable for="ConfirmPassword" style="margin-left: 100px;">Confirm Password:</lable>
            <input type="password" id="ConfirmPassword" name="ConfirmPassword" >
            <br><br>
            <div style="margin-left: 250px;">
                <button style="background-color:#FF6600; color: white;">Submit</button>
                <input type="Reset" style="background-color:#FF6600; color: white;">
            </div>
            <br><br>
        </div>
    </form>
</body>
</html>
