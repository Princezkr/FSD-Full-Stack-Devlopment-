<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../Css/Day14Assignment2.css">
</head>
<body>
    <div class="ForFlex">
        <div id="Todo">
            <form>
            <div id="Upper">
                <h2>My ToDo List</h2>
                <button>Add Task</button>
                <button id="Clear" type="reset">Clear All</button>
            </div>
            <div id="Lower">
                <input id="report" type="checkbox" value="Finish report" name="List">
                <label for="report">Finish report <br></label>
                <input id="Groceries" type="checkbox" value="Buy groceries" name="List">
                <label for="Groceries">Buy groceries <br></label>
                <input id="Mom" type="checkbox" value="Call mom" name="List">
                <label for="Mom" for="report">Call mom</label>
            </div>
            </form>
        </div>
    </div>
</body>
</html>
